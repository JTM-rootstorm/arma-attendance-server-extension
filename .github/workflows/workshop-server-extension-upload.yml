name: Manual Workshop server extension upload

on:
  workflow_dispatch:
    inputs:
      upload_to_workshop:
        description: "Upload @tcwa3_stats_tracker_server to Steam Workshop"
        required: true
        type: boolean
        default: false
      changelog:
        description: "Workshop changelog text"
        required: false
        type: string
        default: "TCWA3 Stats Tracker server extension package update."

permissions:
  contents: read

jobs:
  linux-extension:
    name: Build Linux extension
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build in Ubuntu 20.04 container
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            ubuntu:20.04 \
            bash -lc '
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive

              apt-get update
              apt-get install -y \
                binutils \
                build-essential \
                ca-certificates \
                cmake \
                curl \
                file \
                g++-10 \
                git \
                ninja-build \
                pkg-config \
                python3-pip \
                python3 \
                tar \
                unzip \
                zip

              python3 -m pip install --no-cache-dir "cmake>=3.28,<3.29"
              git clone --depth 1 https://github.com/microsoft/vcpkg /tmp/vcpkg
              /tmp/vcpkg/bootstrap-vcpkg.sh -disableMetrics

              cmake -S extension -B build/extension-linux \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_CXX_COMPILER=g++-10 \
                -DCMAKE_TOOLCHAIN_FILE=/tmp/vcpkg/scripts/buildsystems/vcpkg.cmake \
                -DVCPKG_TARGET_TRIPLET=x64-linux

              cmake --build build/extension-linux --config Release
              ctest --test-dir build/extension-linux --output-on-failure
            '

      - name: Upload Linux extension
        uses: actions/upload-artifact@v4
        with:
          name: tcwa3-stats-tracker-extension-linux-x64
          path: |
            build/extension-linux/arma_attendance.so
            build/extension-linux/arma_attendance_x64.so
          if-no-files-found: error

  windows-extension:
    name: Build Windows extension
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bootstrap vcpkg
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg "$env:RUNNER_TEMP\vcpkg"
          & "$env:RUNNER_TEMP\vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          "VCPKG_ROOT=$env:RUNNER_TEMP\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Configure
        run: |
          cmake -S extension -B build/extension-windows `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        run: cmake --build build/extension-windows --config Release

      - name: Smoke test
        run: ctest --test-dir build/extension-windows -C Release --output-on-failure

      - name: Upload Windows extension
        uses: actions/upload-artifact@v4
        with:
          name: tcwa3-stats-tracker-extension-windows-x64
          path: build/extension-windows/**/arma_attendance_x64.dll
          if-no-files-found: error

  assemble:
    name: Assemble and optionally upload server Workshop package
    runs-on: ubuntu-latest
    needs:
      - linux-extension
      - windows-extension
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux extension
        uses: actions/download-artifact@v4
        with:
          name: tcwa3-stats-tracker-extension-linux-x64
          path: build/extension-linux

      - name: Download Windows extension
        uses: actions/download-artifact@v4
        with:
          name: tcwa3-stats-tracker-extension-windows-x64
          path: artifacts/windows

      - name: Assemble server extension package
        run: tools/assemble_workshop_server_extension.sh

      - name: Upload assembled package artifact
        uses: actions/upload-artifact@v4
        with:
          name: tcwa3-stats-tracker-server-extension-workshop
          path: dist/workshop-server-extension/@tcwa3_stats_tracker_server/**
          if-no-files-found: error

      - name: Verify Steam upload secrets
        if: ${{ inputs.upload_to_workshop }}
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
          STEAM_WORKSHOP_SERVER_EXTENSION_ITEM_ID: ${{ secrets.STEAM_WORKSHOP_SERVER_EXTENSION_ITEM_ID }}
        run: |
          test -n "$STEAM_USERNAME"
          test -n "$STEAM_PASSWORD"
          test -n "$STEAM_WORKSHOP_SERVER_EXTENSION_ITEM_ID"

      - name: Upload to Steam Workshop
        if: ${{ inputs.upload_to_workshop }}
        uses: arma-actions/workshop-upload@v1
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
          STEAM_TOTP_SECRET: ${{ secrets.STEAM_TOTP_SECRET }}
        with:
          appId: "107410"
          itemId: ${{ secrets.STEAM_WORKSHOP_SERVER_EXTENSION_ITEM_ID }}
          contentPath: dist/workshop-server-extension/@tcwa3_stats_tracker_server
          changelog: ${{ inputs.changelog }}
