# TCWA3 Stats Tracker server extension config template.
# Copy this file outside the Workshop folder before editing it.
# Never commit the real tcwa3_stats_tracker.toml.

[server]
server_key = "main-linux-01"

[http]
base_url = "https://stats.example.com"
api_token = "aat_arma_server_REPLACE_WITH_REAL_TOKEN"
timeout_ms = 5000
verify_tls = true

[logging]
level = "info"

[queue]
enabled = true
queue_file = "/var/lib/tcwa3-stats-tracker/main/queue.ndjson"
queue_sent_file = "/var/lib/tcwa3-stats-tracker/main/sent.ndjson"
max_attempts = 25
