# TCWA3 Stats Tracker server extension config template.
# Copy this file to arma_attendance.toml beside the server extension binary before editing it.
# Never commit the real arma_attendance.toml.

[server]
server_key = "main-arma-linux-01"

[http]
base_url = "https://stats.example.com"
api_token = "aat_arma_server_REPLACE_WITH_REAL_TOKEN"
timeout_ms = 5000
verify_tls = true

[logging]
level = "info"

[queue]
enabled = true
queue_file = "arma_attendance_queue.ndjson"
queue_sent_file = "arma_attendance_queue.sent.ndjson"
max_attempts = 25
